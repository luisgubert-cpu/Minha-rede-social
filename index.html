<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaPro - Sua Rede Social</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --bg: #f5f3ff;
            --white: #ffffff;
            --text-main: #1e1b4b;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            background: var(--white);
            border-bottom: 2px solid var(--border);
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .container {
            display: grid;
            grid-template-columns: 300px 1fr 340px;
            gap: 30px;
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* STORIES */
        .stories-strip {
            display: flex;
            gap: 15px;
            padding: 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .story-item { text-align: center; min-width: 70px; cursor: pointer; position: relative; }
        .story-ring {
            width: 60px; height: 60px; border-radius: 50%; padding: 3px;
            background: var(--gradient); margin: 0 auto 5px;
        }
        .story-avatar {
            width: 100%; height: 100%; border-radius: 50%; background: #eee;
            border: 2px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #555;
        }
        .story-name { font-size: 11px; font-weight: 600; color: var(--text-muted); }

        /* POST INPUT */
        .post-input { padding: 20px; }
        textarea {
            width: 100%; border: 1px solid var(--border); border-radius: 12px;
            padding: 12px; resize: none; background: #f9fafb; outline: none; font-size: 15px;
        }
        .input-btns { display: flex; justify-content: space-between; margin-top: 15px; }
        .btn {
            padding: 8px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: var(--gradient); color: white; }
        .btn-story { background: #f3f4f6; color: var(--text-main); border: 1px solid var(--border); }

        /* POST CARD */
        .post-card { padding: 20px; position: relative; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .post-time { font-size: 11px; color: var(--text-muted); margin-left: auto; }
        .post-text { font-size: 16px; line-height: 1.6; margin-bottom: 15px; }
        
        .post-footer {
            display: flex; justify-content: space-around; padding-top: 15px; border-top: 1px solid var(--border);
        }
        .action-btn { cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 14px; font-weight: 600; color: var(--text-muted); }
        .action-btn.active { color: #ef4444; }
        .action-btn.saved { color: #f59e0b; }

        /* COMMENTS */
        .comment-section { background: #f9fafb; padding: 15px; border-top: 1px solid var(--border); }
        .comment { font-size: 13px; margin-bottom: 8px; }
        .comment b { color: var(--primary); }
        .comment-input-area { display: flex; gap: 10px; margin-top: 10px; }
        .comment-input { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 5px 15px; font-size: 13px; outline: none; }

        /* MODAL STORY */
        #story-modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        .story-content {
            width: 350px; height: 600px; background: var(--gradient); border-radius: 20px;
            padding: 40px; color: white; display: flex; flex-direction: column; justify-content: center; text-align: center;
            position: relative;
        }
        .close-story { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; }

        @media (max-width: 1100px) { .container { grid-template-columns: 1fr 340px; } .sidebar-left { display: none; } }
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } .sidebar-right { display: none; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">📸 InstaPro</div>
        <div class="profile-badge" style="width: 35px; height: 35px; background: var(--gradient); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">VC</div>
    </header>

    <div class="container">
        <!-- SIDEBAR ESQUERDA -->
        <div class="sidebar-left">
            <div class="card" style="padding: 20px; text-align: center;">
                <div style="width: 80px; height: 80px; background: var(--gradient); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; font-weight: bold;">VC</div>
                <h3>Você</h3>
                <p style="color: var(--text-muted); font-size: 14px;">@voce_no_pro</p>
                <div style="display: flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
                    <div><b id="post-count">1</b><br><small>Posts</small></div>
                    <div><b>512</b><br><small>Seguindo</small></div>
                    <div><b>2.4k</b><br><small>Seguidores</small></div>
                </div>
            </div>
        </div>

        <!-- FEED -->
        <div class="main-feed">
            <!-- STORIES -->
            <div class="card">
                <div class="stories-strip" id="stories-list">
                    <div class="story-item" onclick="viewStory('Bem-vindo ao InstaPro! 🚀')">
                        <div class="story-ring"><div class="story-avatar">IP</div></div>
                        <span class="story-name">InstaPro</span>
                    </div>
                </div>
            </div>

            <!-- POST INPUT -->
            <div class="card post-input">
                <textarea id="main-input" placeholder="O que você quer compartilhar?" rows="3"></textarea>
                <div class="input-btns">
                    <button class="btn btn-story" onclick="addStory()">+ Story</button>
                    <button class="btn btn-primary" onclick="addPost()">Publicar</button>
                </div>
            </div>

            <!-- FEED LIST -->
            <div id="feed-list">
                <!-- POST EXEMPLO -->
                <div class="card post-card">
                    <div class="post-header">
                        <div style="width: 35px; height: 35px; background: #ec4899; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px;">AB</div>
                        <b>Ana Beatriz</b>
                        <span class="post-time">há 5 minutos</span>
                    </div>
                    <div class="post-text">Acabei de entrar no InstaPro e estou amando as novas funcionalidades! 💖✨</div>
                    <div class="post-footer">
                        <div class="action-btn" onclick="toggleLike(this)">❤️ <span>42</span></div>
                        <div class="action-btn" onclick="focusComment(this)">💬 Comentar</div>
                        <div class="action-btn" onclick="sharePost()">✈️</div>
                        <div class="action-btn" onclick="toggleSave(this)">🔖</div>
                    </div>
                    <div class="comment-section">
                        <div class="comments-list">
                            <div class="comment"><b>Mateus:</b> Ficou muito bom mesmo! 🔥</div>
                        </div>
                        <div class="comment-input-area">
                            <input type="text" class="comment-input" placeholder="Escreva um comentário..." onkeypress="postComment(event, this)">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SIDEBAR DIREITA -->
        <div class="sidebar-right">
            <div class="card">
                <h4 style="padding: 15px; margin: 0; border-bottom: 1px solid var(--border);">SUGESTÕES</h4>
                <div style="padding: 10px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 30px; height: 30px; background: #6366f1; border-radius: 50%;"></div>
                            <span style="font-size: 14px; font-weight: 600;">Carlos Silva</span>
                        </div>
                        <button style="color: var(--primary); background: none; border: none; font-weight: bold; cursor: pointer;">Seguir</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- STORY MODAL -->
    <div id="story-modal">
        <div class="story-content">
            <span class="close-story" onclick="closeStory()">&times;</span>
            <h2 id="story-text-display"></h2>
        </div>
    </div>

    <script>
        let postCount = 1;

        // FUNÇÃO PARA EMOJIS AUTOMÁTICOS
        function getAutoEmojis(text) {
            const map = {
                'feliz': '😊✨', 'triste': '😢💔', 'amor': '❤️😍', 'festa': '🎉🥳',
                'trabalho': '💻💼', 'comida': '🍕😋', 'viagem': '✈️🌍', 'futebol': '⚽🔥',
                'musica': '🎵🎧', 'bom dia': '☀️☕', 'boa noite': '🌙✨'
            };
            let emojis = '';
            for (let key in map) {
                if (text.toLowerCase().includes(key)) emojis += ' ' + map[key];
            }
            return emojis || ' ✨';
        }

        // POSTAR
        function addPost() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if (!text) return alert("Escreva algo!");

            const feed = document.getElementById('feed-list');
            const post = document.createElement('div');
            post.className = 'card post-card';
            
            const time = new Date();
            const emojis = getAutoEmojis(text);

            post.innerHTML = `
                <div class="post-header">
                    <div style="width: 35px; height: 35px; background: var(--gradient); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px;">VC</div>
                    <b>Você</b>
                    <span class="post-time" data-time="${time.getTime()}">agora mesmo</span>
                </div>
                <div class="post-text">${text}${emojis}</div>
                <div class="post-footer">
                    <div class="action-btn" onclick="toggleLike(this)">❤️ <span>0</span></div>
                    <div class="action-btn" onclick="focusComment(this)">💬 Comentar</div>
                    <div class="action-btn" onclick="sharePost()">✈️</div>
                    <div class="action-btn" onclick="toggleSave(this)">🔖</div>
                </div>
                <div class="comment-section">
                    <div class="comments-list"></div>
                    <div class="comment-input-area">
                        <input type="text" class="comment-input" placeholder="Escreva um comentário..." onkeypress="postComment(event, this)">
                    </div>
                </div>
            `;
            feed.insertBefore(post, feed.firstChild);
            input.value = "";
            postCount++;
            document.getElementById('post-count').innerText = postCount;
        }

        // STORY
        function addStory() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if (!text) return alert("Escreva o texto do seu Story na caixa principal!");

            const list = document.getElementById('stories-list');
            const item = document.createElement('div');
            item.className = 'story-item';
            item.onclick = () => viewStory(text);
            item.innerHTML = `
                <div class="story-ring"><div class="story-avatar" style="background: var(--secondary); color: white;">VC</div></div>
                <span class="story-name">Seu Story</span>
            `;
            list.appendChild(item);
            input.value = "";
            alert("Story postado com sucesso!");
        }

        function viewStory(text) {
            document.getElementById('story-text-display').innerText = text;
            document.getElementById('story-modal').style.display = 'flex';
        }

        function closeStory() {
            document.getElementById('story-modal').style.display = 'none';
        }

        // INTERAÇÕES
        function toggleLike(btn) {
            btn.classList.toggle('active');
            let span = btn.querySelector('span');
            let count = parseInt(span.innerText);
            span.innerText = btn.classList.contains('active') ? count + 1 : count - 1;
        }

        function toggleSave(btn) {
            btn.classList.toggle('saved');
            btn.innerText = btn.classList.contains('saved') ? '🔖 Salvo' : '🔖';
        }

        function sharePost() {
            alert("Link copiado para a área de transferência! ✈️");
        }

        function focusComment(btn) {
            btn.closest('.post-card').querySelector('.comment-input').focus();
        }

        function postComment(e, input) {
            if (e.key === 'Enter' && input.value.trim()) {
                const list = input.closest('.comment-section').querySelector('.comments-list');
                const div = document.createElement('div');
                div.className = 'comment';
                div.innerHTML = `<b>Você:</b> ${input.value}`;
                list.appendChild(div);
                input.value = "";
            }
        }

        // ATUALIZAR TEMPO
        setInterval(() => {
            document.querySelectorAll('.post-time').forEach(span => {
                const time = span.getAttribute('data-time');
                if (!time) return;
                const diff = Math.floor((new Date().getTime() - time) / 60000);
                if (diff < 1) span.innerText = 'agora mesmo';
                else if (diff === 1) span.innerText = 'há 1 minuto';
                else span.innerText = `há ${diff} minutos`;
            });
        }, 10000);
    </script>
</body>
</html>
