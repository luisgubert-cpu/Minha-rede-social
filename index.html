<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaClone</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --white: #ffffff;
            --border: #dbdbdb;
            --text-primary: #262626;
            --text-secondary: #8e8e8e;
            --accent: #0095f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding-top: 60px;
        }

        /* Header Estilo Instagram */
        header {
            background-color: var(--white);
            border-bottom: 1px solid var(--border);
            height: 60px;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-content {
            width: 90%;
            max-width: 975px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            font-size: 24px;
            font-style: italic;
        }

        .main-container {
            max-width: 470px;
            margin: 30px auto;
            width: 100%;
        }

        /* Criador de Post (Simulado como o modal de upload) */
        .post-creator {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .post-creator h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            text-align: center;
        }

        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            resize: none;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .btn-post {
            background-color: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-post:hover {
            background-color: #1877f2;
        }

        /* Feed de Posts */
        .post {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 12px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 12px;
            border: 1px solid var(--border);
            background-size: cover;
            background-position: center;
        }

        .username {
            font-weight: 600;
            font-size: 14px;
        }

        .post-image {
            width: 100%;
            min-height: 300px;
            background-color: #efefef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .post-actions {
            padding: 12px;
            display: flex;
            gap: 16px;
        }

        .action-icon {
            cursor: pointer;
            font-size: 24px;
            transition: transform 0.1s ease;
        }

        .action-icon:active {
            transform: scale(1.2);
        }

        .liked {
            color: #ed4956;
        }

        .post-info {
            padding: 0 12px 12px 12px;
        }

        .likes-count {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        .caption {
            font-size: 14px;
            line-height: 1.4;
        }

        .caption .username {
            margin-right: 5px;
        }

        .time {
            color: var(--text-secondary);
            font-size: 10px;
            text-transform: uppercase;
            margin-top: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-content">
            <div class="logo">InstaClone</div>
            <div style="font-size: 20px;">🏠 🔍 ➕ ❤️ 👤</div>
        </div>
    </header>

    <div class="main-container">
        <!-- Criar Novo Post -->
        <div class="post-creator">
            <h3>Criar nova publicação</h3>
            <textarea id="captionInput" placeholder="Escreva uma legenda..." rows="3"></textarea>
            <button class="btn-post" onclick="addPost()">Compartilhar</button>
        </div>

        <!-- Feed -->
        <div id="feed">
            <!-- Post de Exemplo -->
            <div class="post">
                <div class="post-header">
                    <div class="avatar" style="background-image: url('https://i.pravatar.cc/150?u=manus');"></div>
                    <span class="username">manus_ai</span>
                </div>
                <div class="post-image">📸</div>
                <div class="post-actions">
                    <span class="action-icon" onclick="toggleHeart(this)">🤍</span>
                    <span class="action-icon">💬</span>
                    <span class="action-icon">✈️</span>
                </div>
                <div class="post-info">
                    <span class="likes-count">1.234 curtidas</span>
                    <div class="caption">
                        <span class="username">manus_ai</span>
                        Olá mundo! Este é o meu clone do Instagram feito com HTML e CSS.
                    </div>
                    <span class="time">HÁ 2 HORAS</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function addPost() {
            const input = document.getElementById('captionInput');
            const text = input.value.trim();

            if (text === "") {
                alert("Escreva uma legenda para sua foto!");
                return;
            }

            const feed = document.getElementById('feed');
            const postDiv = document.createElement('div');
            postDiv.className = 'post';
            
            // Gerar cor aleatória para o placeholder da imagem
            const randomColor = Math.floor(Math.random()*16777215).toString(16);

            postDiv.innerHTML = `
                <div class="post-header">
                    <div class="avatar" style="background-image: url('https://i.pravatar.cc/150?u=user');"></div>
                    <span class="username">voce_no_insta</span>
                </div>
                <div class="post-image" style="background-color: #${randomColor}">🖼️</div>
                <div class="post-actions">
                    <span class="action-icon" onclick="toggleHeart(this)">🤍</span>
                    <span class="action-icon">💬</span>
                    <span class="action-icon">✈️</span>
                </div>
                <div class="post-info">
                    <span class="likes-count">0 curtidas</span>
                    <div class="caption">
                        <span class="username">voce_no_insta</span>
                        ${text}
                    </div>
                    <span class="time">AGORA MESMO</span>
                </div>
            `;

            feed.insertBefore(postDiv, feed.firstChild);
            input.value = "";
        }

        function toggleHeart(el) {
            if (el.innerHTML === "🤍") {
                el.innerHTML = "❤️";
                el.classList.add('liked');
                
                // Atualizar contador de curtidas (simulado)
                const postInfo = el.parentElement.nextElementSibling;
                const likesSpan = postInfo.querySelector('.likes-count');
                let count = parseInt(likesSpan.innerHTML.replace(/\D/g, '')) || 0;
                likesSpan.innerHTML = (count + 1).toLocaleString() + " curtidas";
            } else {
                el.innerHTML = "🤍";
                el.classList.remove('liked');
                
                const postInfo = el.parentElement.nextElementSibling;
                const likesSpan = postInfo.querySelector('.likes-count');
                let count = parseInt(likesSpan.innerHTML.replace(/\D/g, '')) || 0;
                likesSpan.innerHTML = (count - 1).toLocaleString() + " curtidas";
            }
        }
    </script>
</body>
</html>
